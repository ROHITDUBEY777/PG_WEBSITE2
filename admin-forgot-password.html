<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Forgot Password | AR PG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e1f47, #3a2e8a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    /* Header Section */
    .header {
      background: linear-gradient(135deg, #1e1f47 0%, #3a2e8a 50%, #5c33c2 100%);
      color: white;
      text-align: center;
      padding: 2.5rem 1.5rem 3rem;
      position: relative;
    }

    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      margin-top: 0.8rem;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-top: 0.3rem;
    }

    .lock-icon {
      font-size: 2.8rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.25);
      display: inline-block;
    }

    .wave {
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 45px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" fill="white"/></svg>')
        no-repeat center/cover;
    }

    /* Steps */
    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      background: #fff;
      padding: 1rem;
    }

    .step {
      text-align: center;
      color: #aaa;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin: 0 auto 0.4rem;
      border: 2px solid transparent;
      transition: all 0.3s;
    }

    .active .circle {
      background: linear-gradient(135deg, #3a2e8a, #5c33c2);
      color: #fff;
      border-color: #fff;
    }

    .active {
      color: #333;
    }

    .content {
      padding: 2rem;
    }

    .info {
      background: #edf2ff;
      border-left: 4px solid #3a2e8a;
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      font-weight: 600;
      color: #333;
      display: block;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1.8px solid #dbe2f0;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #3a2e8a;
      box-shadow: 0 0 0 3px rgba(58, 46, 138, 0.15);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #3a2e8a, #5c33c2);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(58, 46, 138, 0.4);
    }

    .back-link {
      text-align: center;
      margin-top: 1rem;
    }

    .back-link a {
      color: #3a2e8a;
      text-decoration: none;
      font-weight: 600;
    }

    .alert {
      display: none;
      border-radius: 10px;
      padding: 0.9rem;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 600;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="lock-icon">🧑‍💼</div>
      <h1>Admin Password Reset</h1>
      <p>🔐 Reset your admin password securely in 3 steps</p>
      <div class="wave"></div>
    </div>

    <!-- Steps -->
    <div class="steps">
      <div class="step active" id="stepOne">
        <div class="circle">1</div>
        <div>Email</div>
      </div>
      <div class="step" id="stepTwo">
        <div class="circle">2</div>
        <div>Verify</div>
      </div>
      <div class="step" id="stepThree">
        <div class="circle">3</div>
        <div>Reset</div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <div id="alertBox" class="alert"></div>

      <!-- Step 1 -->
      <div id="formStep1">
        <div class="info">📧 Enter the admin email to receive a reset code.</div>
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="email" placeholder="admin@arpg.com" required />
        </div>
        <button onclick="handleStep1()">Send Reset Code →</button>
      </div>

      <!-- Step 2 -->
      <div id="formStep2" style="display:none;">
        <div class="info">✉️ Enter the reset code sent to your admin email.</div>
        <div class="form-group">
          <label>Reset Code</label>
          <input type="text" id="resetCode" placeholder="Enter 6-digit code" maxlength="6" required />
        </div>
        <button onclick="handleStep2()">Verify Code →</button>
        <div class="back-link"><a href="#" onclick="goBack(1)">← Back</a></div>
      </div>

      <!-- Step 3 -->
      <div id="formStep3" style="display:none;">
        <div class="info">🔑 Set a new secure admin password.</div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" />
        </div>
        <button onclick="handleStep3()">Reset Password ✓</button>
      </div>

      <div class="back-link"><a href="auth.html">← Back to Login</a></div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:5000/api';
    let adminEmail = '';

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert ${type}`;
      box.style.display = 'block';
      setTimeout(() => (box.style.display = 'none'), 4000);
    }

    function updateStep(active) {
      ['stepOne', 'stepTwo', 'stepThree'].forEach((id, i) => {
        const step = document.getElementById(id);
        step.classList.toggle('active', i + 1 <= active);
      });
    }

    async function handleStep1() {
      const email = document.getElementById('email').value.trim();
      if (!email) return showAlert('Enter your admin email.', 'error');
      adminEmail = email;
      showAlert('Sending reset code...', 'success');

      try {
        const res = await fetch(BACKEND_URL + '/admin-forgot-password/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.success) {
          showAlert('✅ Reset code sent to admin email.', 'success');
          document.getElementById('formStep1').style.display = 'none';
          document.getElementById('formStep2').style.display = 'block';
          updateStep(2);
        } else showAlert(data.message, 'error');
      } catch {
        showAlert('Network error.', 'error');
      }
    }

    async function handleStep2() {
      const code = document.getElementById('resetCode').value.trim();
      if (code.length !== 6) return showAlert('Enter a valid 6-digit code.', 'error');

      try {
        const res = await fetch(BACKEND_URL + '/admin-forgot-password/verify-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: adminEmail, code }),
        });
        const data = await res.json();
        if (data.success) {
          showAlert('✅ Code verified. Set new password.', 'success');
          document.getElementById('formStep2').style.display = 'none';
          document.getElementById('formStep3').style.display = 'block';
          updateStep(3);
        } else showAlert(data.message, 'error');
      } catch {
        showAlert('Error verifying code.', 'error');
      }
    }

    async function handleStep3() {
      const pass = document.getElementById('newPassword').value.trim();
      const confirm = document.getElementById('confirmPassword').value.trim();
      if (pass !== confirm) return showAlert('Passwords do not match.', 'error');
      if (pass.length < 6) return showAlert('Password too short.', 'error');

      try {
        const res = await fetch(BACKEND_URL + '/admin-forgot-password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: adminEmail, newPassword: pass }),
        });
        const data = await res.json();
        if (data.success) {
          showAlert('✅ Password reset successful! Redirecting...', 'success');
          setTimeout(() => (window.location.href = 'auth.html'), 2000);
        } else showAlert(data.message, 'error');
      } catch {
        showAlert('Error resetting password.', 'error');
      }
    }

    function goBack(step) {
      if (step === 1) {
        document.getElementById('formStep2').style.display = 'none';
        document.getElementById('formStep1').style.display = 'block';
        updateStep(1);
      }
    }
  </script>
</body>
</html>
