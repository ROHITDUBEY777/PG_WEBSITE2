<body>
    <div class="container">
        <div class="header">
            <img src="image.png" alt="AR PG Logo">
            <h1>AR PG Admin</h1>
            <p>Management Dashboard</p>
            <div class="admin-badge">🔐 Admin Login</div>
        </div>

        <div class="form-container">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="demo-info">
                <strong>📝 Demo Credentials:</strong>
                Email: admin@arpg.com<br>
                Password: admin123
            </div>

            <div class="info-box">
                <strong>⚠️ Important:</strong>
                Only the PG owner should have access to this panel. Do not share your credentials!
            </div>

            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input 
                        type="email" 
                        id="adminEmail" 
                        name="email" 
                        placeholder="Enter your email"
                        value="admin@arpg.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input 
                        type="password" 
                        id="adminPassword" 
                        name="password" 
                        placeholder="Enter your password"
                        value="admin123"
                        required
                    >
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe" style="margin: 0; font-weight: normal;">Remember me for 7 days</label>
                </div>

                <button type="submit" class="btn-login">🔓 Login to Admin Panel</button>
            </form>

            <div class="footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:5000/api';

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', function() {
            const adminToken = localStorage.getItem('adminToken');
            if (adminToken && isTokenValid(adminToken)) {
                window.location.href = 'admin.html';
            }

            // Pre-fill if remember me was checked
            const rememberedEmail = localStorage.getItem('adminEmail');
            if (rememberedEmail) {
                document.getElementById('adminEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function isTokenValid(token) {
            try {
                const decoded = JSON.parse(atob(token.split('.')[1]));
                return decoded.exp > Date.now() / 1000;
            } catch (e) {
                return false;
            }
        }

        async function handleAdminLogin(event) {
            event.preventDefault();

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Clear previous messages
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            try {
                // For demo purposes, verify credentials locally
                // In production, you would verify on the backend
                if (email === 'admin@arpg.com' && password === 'admin123') {
                    // Create a simple token
                    const token = createToken(email);
                    
                    // Store token
                    localStorage.setItem('adminToken', token);
                    localStorage.setItem('adminEmail', email);

                    // If remember me is checked, set expiration to 7 days
                    if (rememberMe) {
                        const expirationDate = new Date();
                        expirationDate.setDate(expirationDate.getDate() + 7);
                        localStorage.setItem('adminTokenExpiration', expirationDate.getTime());
                    } else {
                        localStorage.removeItem('adminTokenExpiration');
                    }

                    // Show success message
                    const successDiv = document.getElementById('successMessage');
                    successDiv.textContent = '✅ Login successful! Redirecting to dashboard...';
                    successDiv.style.display = 'block';

                    // Redirect to admin dashboard
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1500);
                } else {
                    // Show error message
                    const errorDiv = document.getElementById('errorMessage');
                    errorDiv.textContent = '❌ Invalid email or password. Please try again.';
                    errorDiv.style.display = 'block';
                    document.getElementById('adminPassword').value = '';
                }
            } catch (error) {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = '❌ Error: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Login error:', error);
            }
        }

        function createToken(email) {
            // Simple token creation (for demo)
            // In production, use JWT
            const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
            const payload = btoa(JSON.stringify({
                email: email,
                iat: Math.floor(Date.now() / 1000),
                exp: Math.floor(Date.now() / 1000) + (7 * 24 * 60 * 60) // 7 days
            }));
            const signature = btoa('secret-key');
            return `${header}.${payload}.${signature}`;
        }
    </script>
