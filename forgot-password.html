<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | AR PG</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%; max-width: 420px;
      background: linear-gradient(180deg, #f9fbff, #eaf3ff);
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      overflow: hidden;
      text-align: center;
      padding-bottom: 20px;
    }

    /* HEADER */
    .header {
      padding: 2rem 1rem 2.5rem;
      background: linear-gradient(135deg, #667eea 0%, #801fe0 100%);
      color: white;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      position: relative;
    }

    .header img {
      width: 80px; background: rgba(255,255,255,0.2);
      padding: 8px; border-radius: 12px; margin-bottom: 10px;
    }

    .curve {
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 40px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" fill="white"/></svg>');
      background-size: cover; background-repeat: no-repeat;
    }

    .steps {
      display: flex; justify-content: space-around;
      padding: 15px 10px; margin-top: 5px;
    }

    .step {
      text-align: center;
      opacity: 0.4;
      transition: 0.3s;
    }

    .step.active { opacity: 1; }
    
    .step-circle {
      width: 38px; height: 38px;
      border-radius: 50%; background: #667eea;
      color: white; display: flex; align-items: center; justify-content: center;
      margin: auto; font-weight: bold;
      box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    }

    .step.completed .step-circle {
      background: #10b981;
    }

    .step p {
      margin-top: 5px;
      font-size: 0.85rem;
    }

    .content { padding: 20px 30px; }
    
    label { 
      font-weight: 600; 
      margin-bottom: 6px; 
      display: block; 
      text-align: left; 
    }

    input {
      width: 100%; padding: 12px 16px;
      border-radius: 12px; border: 1.8px solid #d0d7e6;
      outline: none; margin-bottom: 14px;
      font-size: 0.95rem;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }

    button {
      width: 100%; padding: 12px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; font-weight: 600; font-size: 1rem;
      cursor: pointer; transition: 0.25s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(102,126,234,0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      margin-top: 15px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .info-text {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .email-display {
      color: #667eea;
      font-weight: 600;
    }

    .resend-link {
      display: block;
      margin-top: 10px;
      color: #667eea;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
    }

    .resend-link:hover {
      text-decoration: underline;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 12px;
      color: white;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.loading { background: linear-gradient(135deg, #f59e0b, #d97706); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    /* Success animation */
    .success-icon {
      font-size: 60px;
      margin-bottom: 15px;
      animation: bounceIn 0.5s ease;
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Step content */
    .step-content {
      display: none;
    }

    .step-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Debug Panel */
    .debug-panel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      max-width: 300px;
      display: none;
    }

    .debug-panel.show {
      display: block;
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <img src="image.png" alt="AR PG Logo">
      <h2>Forgot Password</h2>
      <p>Reset your password in 3 simple steps ✨</p>
      <div class="curve"></div>
    </div>

    <!-- STEPS UI -->
    <div class="steps">
      <div class="step active" id="s1">
        <div class="step-circle">1</div>
        <p>Email</p>
      </div>
      <div onclick="step2"  class="step active" id="s2">
        <div class="step-circle">2</div>
        <p>Verify</p>
      </div>
      <div class="step active" id="s3">
        <div class="step-circle">3</div>
        <p>Reset</p>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- STEP 1: Enter Email -->
      <div id="step1" class="step-content active">
        <label>📧 Enter Your Email Address</label>
        <input type="email" id="email" placeholder="your.email@example.com" autofocus>
        <button onclick="sendCode()" id="sendBtn">Send Reset Code</button>
        <a href="auth.html" class="back-link">← Back to Login</a>
      </div>

      <!-- STEP 2: Verify Code -->
      <div  id="step2" class="step-content">
        <label>🔐 Enter 6-Digit Code</label>
        <p class="info-text">Code sent to: <span class="email-display" id="emailDisplay"></span></p>
        <input type="text" id="otp" maxlength="6" placeholder="Enter 6-digit code" 
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <button onclick="verifyCode()" id="verifyBtn">Verify Code</button>
        <a href="#" onclick="resendCode(); return false;" class="resend-link">🔄 Didn't receive? Resend Code</a>
        <a href="#" onclick="goToStep(1); return false;" class="resend-link">← Change Email</a>
      </div>

      <!-- STEP 3: Reset Password -->
      <div id="step3" class="step-content">
        <label>🔑 New Password</label>
        <input type="password" id="newPass" placeholder="Enter new password (min 6 characters)">

        <label>🔒 Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Confirm new password">

        <button onclick="resetPassword()" id="resetBtn">Reset Password</button>
      </div>

      <!-- STEP 4: Success -->
      <div id="step4" class="step-content">
        <div class="success-icon">🎉</div>
        <h3 style="color: #10b981; margin-bottom: 10px;">Password Reset Successful!</h3>
        <p class="info-text">You can now login with your new password.</p>
        <button onclick="window.location.href='password-reset-success.html'">Continue</button>
      </div>

    </div>

  </div>

  <!-- Debug Panel (Press D to toggle) -->
  <div class="debug-panel" id="debugPanel">
    <strong>🐛 Debug Info:</strong><br>
    <span id="debugText">Press D to toggle debug</span>
  </div>


<script>
const API = "http://localhost:5000/api";
let currentEmail = "";
let debugMode = false;

/* ==================== DEBUG HELPER ==================== */
function debugLog(message) {
  console.log(message);
  if (debugMode) {
    const panel = document.getElementById('debugPanel');
    const text = document.getElementById('debugText');
    text.innerHTML = message.replace(/\n/g, '<br>');
    panel.classList.add('show');
  }
}

//toggle debug mode with 'D' key
document.addEventListener('keydown', (e) => {
  if (
    e.key?.toLowerCase() === 'd' &&
    e.target instanceof Element &&
    !e.target.matches('input')
  ) {
    debugMode = !debugMode;
    document
      .getElementById('debugPanel')
      ?.classList.toggle('show', debugMode);

    debugLog(`Debug mode: ${debugMode ? 'ON' : 'OFF'}`);
  }
});


/* ==================== TOAST NOTIFICATION ==================== */
function showToast(message, type = 'loading') {
  debugLog(`Toast: ${type} - ${message}`);
  
  // Remove existing toast
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  let icon = '';
  if (type === 'success') icon = '✅ ';
  else if (type === 'error') icon = '❌ ';
  else if (type === 'loading') icon = '⏳ ';
  
  toast.textContent = icon + message;
  document.body.appendChild(toast);
  
  // Auto remove after 3 seconds (except loading)
  if (type !== 'loading') {
    setTimeout(() => {
      toast.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
  
  return toast;
}

function hideToast() {
  const toast = document.querySelector('.toast');
  if (toast) {
    toast.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }
}

/* ==================== STEP MANAGEMENT ==================== */
function setStepIndicator(step) {
  debugLog(`Setting step indicator: ${step}`);
  
  // Update step indicators
  for (let i = 1; i <= 3; i++) {
    const stepEl = document.getElementById('s' + i);
    if (!stepEl) continue;
    
    stepEl.classList.remove('active', 'completed');
    
    if (i < step) {
      stepEl.classList.add('completed');
    } else if (i === step) {
      stepEl.classList.add('active');
    }
  }
}

function goToStep(stepNum) {
  console.log(`🔄 Going to step ${stepNum}`);
  debugLog(`Navigating to step: ${stepNum}`);
  
  // Hide all step contents
  document.querySelectorAll('.step-content').forEach(el => {
    el.classList.remove('active');
  });
  
  // Show target step
  const targetStep = document.getElementById('step' + stepNum);
  if (targetStep) {
    targetStep.classList.add('active');
    debugLog(`Step ${stepNum} is now active`);
  } else {
    debugLog(`ERROR: Step ${stepNum} not found!`);
  }
  
  // Update indicators (step 4 shows step 3 as completed)
  const indicatorStep = stepNum > 3 ? 3 : stepNum;
  setStepIndicator(indicatorStep);
  
  // Focus appropriate input
  setTimeout(() => {
    if (stepNum === 1) document.getElementById('email')?.focus();
    if (stepNum === 2) document.getElementById('otp')?.focus();
    if (stepNum === 3) document.getElementById('newPass')?.focus();
  }, 100);
}

/* ==================== STEP 1: SEND CODE ==================== */
async function sendCode() {
  const emailInput = document.getElementById('email');
  const btn = document.getElementById('sendBtn');

  // Safety check
  if (!emailInput) {
    showToast('Email input not found!', 'error');
    return;
  }

  const email = emailInput.value.trim().toLowerCase();

  // Validate email
  if (!email || !email.includes('@') || !email.includes('.')) {
    showToast('Please enter a valid email address', 'error');
    emailInput.focus();
    return;
  }

  console.log('📧 Sending code to:', email);
  debugLog(`Step 1: Sending code to ${email}`);

  currentEmail = email;

  btn.disabled = true;
  btn.textContent = 'Sending...';
  showToast('Sending reset code...', 'loading');

  try {
    debugLog(`Making API call to: ${API}/forgot-password/send-code`);

    const response = await fetch(`${API}/forgot-password/send-code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    console.log('📊 Response status:', response.status);
    debugLog(`Response status: ${response.status}`);

    const text = await response.text();
    console.log('📦 Raw response:', text);
    debugLog(`Raw response: ${text.substring(0, 100)}...`);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      hideToast();
      showToast('Server error. Please try again.', 'error');
      debugLog(`Parse error: ${e.message}`);
      return;
    }

    console.log('✅ Parsed data:', data);
    debugLog(`Parsed: success=${data.success}, message=${data.message}`);

    // SUCCESS CASE
    if (data.success === true || data.success === 'true' || response.status === 200) {

      document.getElementById('emailDisplay').textContent = email;
      debugLog('✅ Code sent successfully! Waiting 5 seconds...');

      // ⏳ WAIT 5 SECONDS BEFORE MOVING TO STEP 2
      setTimeout(() => {
        goToStep(2);
        hideToast();
        showToast('Reset code sent to your email!', 'success');

        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }, 5000);

    } else {
      hideToast();
      const errorMsg = data.message || 'Failed to send code';
      showToast(errorMsg, 'error');
      debugLog(`❌ Failed: ${errorMsg}`);

      btn.disabled = false;
      btn.textContent = 'Send Reset Code';
    }

  } catch (err) {
    console.error('❌ Error:', err);
    debugLog(`❌ Network error: ${err.message}`);
    hideToast();
    showToast('Cannot connect to server!', 'error');

    btn.disabled = false;
    btn.textContent = 'Send Reset Code';
  }
}

/* ==================== STEP 2: VERIFY CODE ==================== */
async function verifyCode() {
  const otpInput = document.getElementById('otp');
  const code = otpInput.value.trim();
  const btn = document.getElementById('verifyBtn');
  
  console.log('🔐 Verifying code:', code);
  debugLog(`Step 2: Verifying code ${code} for ${currentEmail}`);
  
  if (code.length !== 6) {
    showToast('Please enter the 6-digit code', 'error');
    otpInput.focus();
    return;
  }
  
  if (!currentEmail) {
    showToast('Email not found. Please start over.', 'error');
    goToStep(1);
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Verifying...';
  showToast('Verifying code...', 'loading');
  
  try {
    debugLog(`Making API call to: ${API}/forgot-password/verify-code`);
    
    const response = await fetch(`${API}/forgot-password/verify-code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentEmail, code: code })
    });
    
    console.log('📊 Response status:', response.status);
    debugLog(`Response status: ${response.status}`);
    
    const text = await response.text();
    console.log('📦 Raw response:', text);
    
    const data = JSON.parse(text);
    console.log('✅ Parsed:', data);
    debugLog(`Parsed: success=${data.success}, message=${data.message}`);
    
    if (data.success === true || data.success === 'true') {
      hideToast();
      showToast('Code verified successfully!', 'success');
      
      debugLog(`✅ Code verified! Moving to step 3...`);
      
      // Move to step 3
      setTimeout(() => {
        console.log('🚀 Navigating to Step 3');
        goToStep(3);
      }, 800);
      
    } else {
      hideToast();
      showToast(data.message || 'Invalid code', 'error');
      debugLog(`❌ Invalid code: ${data.message}`);
      otpInput.value = '';
      otpInput.focus();
    }
    
  } catch (err) {
    console.error('❌ Error:', err);
    debugLog(`❌ Error: ${err.message}`);
    hideToast();
    showToast('Connection error!', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Verify Code';
  }
}

/* ==================== STEP 3: RESET PASSWORD ==================== */
async function resetPassword() {
  const newPassInput = document.getElementById('newPass');
  const confirmPassInput = document.getElementById('confirmPass');
  const pass = newPassInput.value;
  const cpass = confirmPassInput.value;
  const btn = document.getElementById('resetBtn');
  
  console.log('🔑 Resetting password...');
  debugLog(`Step 3: Resetting password for ${currentEmail}`);
  
  // Validate
  if (!pass || !cpass) {
    showToast('Please fill both password fields', 'error');
    return;
  }
  
  if (pass.length < 6) {
    showToast('Password must be at least 6 characters', 'error');
    newPassInput.focus();
    return;
  }
  
  if (pass !== cpass) {
    showToast('Passwords do not match', 'error');
    confirmPassInput.focus();
    confirmPassInput.value = '';
    return;
  }
  
  if (!currentEmail) {
    showToast('Session expired. Please start over.', 'error');
    goToStep(1);
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Resetting...';
  showToast('Resetting password...', 'loading');
  
  try {
    debugLog(`Making API call to: ${API}/forgot-password/reset`);
    
    const response = await fetch(`${API}/forgot-password/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentEmail, newPassword: pass })
    });
    
    console.log('📊 Response status:', response.status);
    debugLog(`Response status: ${response.status}`);
    
    const text = await response.text();
    console.log('📦 Raw response:', text);
    
    const data = JSON.parse(text);
    console.log('✅ Parsed:', data);
    debugLog(`Parsed: success=${data.success}, message=${data.message}`);
    
    if (data.success === true || data.success === 'true') {
      hideToast();
      showToast('Password reset successful!', 'success');
      
      debugLog(`✅ Password reset! Moving to step 4...`);
      
      // Move to success step
      setTimeout(() => {
        console.log('🚀 Navigating to Step 4 (Success)');
        goToStep(4);
      }, 800);
      
    } else {
      hideToast();
      showToast(data.message || 'Failed to reset password', 'error');
      debugLog(`❌ Failed: ${data.message}`);
    }
    
  } catch (err) {
    console.error('❌ Error:', err);
    debugLog(`❌ Error: ${err.message}`);
    hideToast();
    showToast('Connection error!', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}

/* ==================== RESEND CODE ==================== */
function resendCode() {
  debugLog(`Resending code to ${currentEmail}`);
  
  if (currentEmail) {
    document.getElementById('email').value = currentEmail;
    goToStep(1);
    setTimeout(() => {
      sendCode();
    }, 300);
  } else {
    showToast('Please enter your email first', 'error');
    goToStep(1);
  }
}

/* ==================== INITIALIZATION ==================== */
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Forgot Password page loaded');
  debugLog('Page initialized, starting at step 1');
  goToStep(1);
  
  // Test backend connection
  fetch(`${API}/test`)
    .then(r => r.json())
    .then(d => {
      console.log('✅ Backend connected:', d.message);
      debugLog(`Backend connected: ${d.message}`);
    })
    .catch(e => {
      console.warn('⚠️ Backend might be offline:', e.message);
      debugLog(`Backend offline: ${e.message}`);
    });
});

/* ==================== ENTER KEY SUPPORT ==================== */
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.target.matches('button')) {
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    
    if (step1.classList.contains('active')) sendCode();
    else if (step2.classList.contains('active')) verifyCode();
    else if (step3.classList.contains('active')) resetPassword();
  }
});
</script>

</body>
</html>
